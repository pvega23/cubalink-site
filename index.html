<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CubaLink — Internet Satelital para Cuba | Satellite Internet for Cuba</title>
<meta name="description" content="CubaLink: Revendedor autorizado de Starlink para Cuba. Internet satelital de alta velocidad, 100-400 Mbps. Cobertura nacional.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%23000'/><path d='M10 20 Q16 8 26 12' stroke='%2300a3ff' stroke-width='2' fill='none'/><circle cx='12' cy='18' r='2' fill='%2300a3ff'/></svg>">
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;color:#e0e0e0;line-height:1.6;overflow-x:hidden;background:#000}
img,svg{display:block;max-width:100%}
a{text-decoration:none;color:inherit}
ul{list-style:none}
button{cursor:pointer;border:none;background:none;font-family:inherit}

/* ===== TYPOGRAPHY ===== */
h1{font-size:clamp(2.2rem,5vw,3.8rem);font-weight:800;line-height:1.1;letter-spacing:-0.02em}
h2{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;line-height:1.2;letter-spacing:-0.01em}
h3{font-size:clamp(1.1rem,2vw,1.4rem);font-weight:600;line-height:1.3}
p{font-size:clamp(0.95rem,1.5vw,1.1rem)}

/* ===== UTILITY ===== */
.container{max-width:1200px;margin:0 auto;padding:0 24px}
.section-pad{padding:120px 0}
.section-label{font-size:0.85rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;color:#00a3ff;margin-bottom:12px}
.section-title{margin-bottom:20px;color:#fff}
.section-subtitle{color:rgba(255,255,255,0.5);max-width:640px;margin:0 auto 48px}
.text-center{text-align:center}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:6px;font-weight:600;font-size:1rem;transition:all 0.3s ease}
.btn-primary{background:#ff6b35;color:#fff}
.btn-primary:hover{background:#e5552a;transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,107,53,0.4)}
.btn-secondary{background:transparent;color:#fff;border:2px solid rgba(255,255,255,0.3)}
.btn-secondary:hover{border-color:#00a3ff;background:rgba(0,163,255,0.08);box-shadow:0 0 20px rgba(0,163,255,0.15)}
.btn-outline{background:transparent;color:#fff;border:2px solid rgba(255,255,255,0.3)}
.btn-outline:hover{background:rgba(0,163,255,0.1);border-color:#00a3ff;box-shadow:0 0 20px rgba(0,163,255,0.2)}

/* ===== SCROLL ANIMATIONS ===== */
.reveal{opacity:0;transform:translateY(30px);transition:opacity 0.7s ease,transform 0.7s ease}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-left{opacity:0;transform:translateX(-40px);transition:opacity 0.7s ease,transform 0.7s ease}
.reveal-left.visible{opacity:1;transform:translateX(0)}
.reveal-right{opacity:0;transform:translateX(40px);transition:opacity 0.7s ease,transform 0.7s ease}
.reveal-right.visible{opacity:1;transform:translateX(0)}

/* ===== ANIMATED STAR FIELD ===== */
.starfield{position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;pointer-events:none}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite var(--delay)}
@keyframes twinkle{0%,100%{opacity:0.15}50%{opacity:1}}

/* ===== SATELLITE TRAILS ===== */
.satellite-trail{position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;pointer-events:none}
.satellite-trail::before,.satellite-trail::after{content:'';position:absolute;width:200px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.6),transparent);transform:rotate(-25deg);animation:sat-move1 8s linear infinite}
.satellite-trail::after{width:150px;background:linear-gradient(90deg,transparent,rgba(0,163,255,0.5),transparent);transform:rotate(-35deg);animation:sat-move2 12s linear infinite 3s}
.satellite-trail-3{position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;pointer-events:none}
.satellite-trail-3::before{content:'';position:absolute;width:180px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);transform:rotate(-20deg);animation:sat-move3 15s linear infinite 6s}
@keyframes sat-move1{0%{top:-10%;left:-20%}100%{top:110%;left:120%}}
@keyframes sat-move2{0%{top:-5%;right:-20%;left:auto}100%{top:105%;right:120%}}
@keyframes sat-move3{0%{top:-15%;left:30%}100%{top:115%;left:80%}}

/* ===== EARTH ATMOSPHERE LINE ===== */
.earth-glow{position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent 5%,#00a3ff 30%,#00d4ff 50%,#00a3ff 70%,transparent 95%);z-index:3;box-shadow:0 0 20px rgba(0,163,255,0.5),0 0 60px rgba(0,163,255,0.2),0 -5px 30px rgba(0,212,255,0.15)}
.earth-glow::before{content:'';position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(to top,rgba(0,163,255,0.06),transparent);pointer-events:none}

/* ===== NAV ===== */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:16px 0;transition:all 0.3s ease}
.nav.scrolled{background:rgba(0,0,0,0.92);backdrop-filter:blur(16px);padding:10px 0;box-shadow:0 1px 0 rgba(0,163,255,0.1)}
.nav-inner{display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:10px;color:#fff;font-size:1.5rem;font-weight:800;letter-spacing:-0.02em}
.nav-logo svg.emblem{width:40px;height:40px}
.nav-links{display:flex;align-items:center;gap:32px}
.nav-links a{color:rgba(255,255,255,0.65);font-size:0.9rem;font-weight:500;transition:color 0.2s}
.nav-links a:hover{color:#fff}
.lang-toggle{display:flex;align-items:center;background:rgba(255,255,255,0.08);border-radius:6px;overflow:hidden;margin-left:16px}
.lang-btn{padding:6px 14px;font-size:0.85rem;font-weight:600;color:rgba(255,255,255,0.4);transition:all 0.2s}
.lang-btn.active{background:#00a3ff;color:#fff}
.lang-divider{color:rgba(255,255,255,0.2);font-size:0.8rem}
.nav-menu-btn{display:none;flex-direction:column;gap:5px;padding:8px}
.nav-menu-btn span{width:24px;height:2px;background:#fff;border-radius:2px;transition:all 0.3s}
.nav-mobile{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.97);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.nav-mobile.open{display:flex}
.nav-mobile a{color:#fff;font-size:1.3rem;font-weight:500}
.nav-mobile-close{position:absolute;top:20px;right:24px;color:#fff;font-size:1.8rem;background:none;border:none;cursor:pointer}

@media(max-width:768px){
  .nav-links{display:none}
  .nav-menu-btn{display:flex}
}

/* ===== HERO ===== */
.hero{position:relative;min-height:100vh;display:flex;align-items:center;background:linear-gradient(180deg,#000000 0%,#050515 40%,#0a0a1a 100%);overflow:hidden}
.hero-grid{position:absolute;top:0;left:0;right:0;bottom:0;background-image:
  linear-gradient(rgba(0,163,255,0.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,163,255,0.03) 1px,transparent 1px);background-size:80px 80px;pointer-events:none}
.hero-orbit{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.hero-orbit-ring{position:absolute;border:1px solid rgba(0,163,255,0.06);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}
.hero-orbit-ring:nth-child(1){width:400px;height:400px;animation:orbit-spin 30s linear infinite}
.hero-orbit-ring:nth-child(2){width:600px;height:600px;animation:orbit-spin 45s linear infinite reverse}
.hero-orbit-ring:nth-child(3){width:800px;height:800px;animation:orbit-spin 60s linear infinite}
.hero-orbit-dot{position:absolute;width:4px;height:4px;background:#00a3ff;border-radius:50%;top:-2px;left:50%;box-shadow:0 0 12px rgba(0,163,255,0.8)}
@keyframes orbit-spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}

.hero-content{position:relative;z-index:2;max-width:720px}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(0,163,255,0.08);border:1px solid rgba(0,163,255,0.2);border-radius:100px;padding:8px 20px;margin-bottom:28px;color:#00a3ff;font-size:0.85rem;font-weight:600}
.hero-badge svg{width:16px;height:16px}
.hero h1{color:#fff;margin-bottom:20px}
.hero h1 .accent{color:#00a3ff}
.hero-sub{color:rgba(255,255,255,0.5);font-size:clamp(1rem,2vw,1.25rem);margin-bottom:36px;max-width:560px;font-weight:300}
.hero-ctas{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:48px}

/* Stats bar */
.stats-bar{position:relative;z-index:2;display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06);border-radius:12px;overflow:hidden;max-width:600px}
.stat-item{padding:24px 20px;text-align:center;background:rgba(255,255,255,0.02)}
.stat-value{font-size:1.6rem;font-weight:800;color:#00a3ff;margin-bottom:4px}
.stat-label{font-size:0.8rem;color:rgba(255,255,255,0.4);font-weight:500;text-transform:uppercase;letter-spacing:0.05em}

@media(max-width:600px){
  .stats-bar{grid-template-columns:1fr;max-width:280px}
  .hero-ctas{flex-direction:column;align-items:flex-start}
}

/* ===== PROBLEM SECTION ===== */
.problem{background:#060620;position:relative}
.problem::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,163,255,0.15),transparent)}
.problem-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center}
.speed-compare{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:40px;backdrop-filter:blur(4px)}
.speed-item{margin-bottom:28px}
.speed-item:last-child{margin-bottom:0}
.speed-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.speed-name{font-weight:600;font-size:0.95rem;color:rgba(255,255,255,0.7)}
.speed-value{font-weight:700;font-size:0.95rem}
.speed-bar{height:16px;border-radius:8px;background:rgba(255,255,255,0.06);overflow:hidden;position:relative}
.speed-fill{height:100%;border-radius:8px;transition:width 1.5s ease;width:0}
.speed-fill.etecsa{background:linear-gradient(90deg,#dc3545,#ff6b6b);width:3%}
.speed-fill.cubalink{background:linear-gradient(90deg,#00a3ff,#00d4ff);width:100%}
.speed-fill.animated{transition:width 1.5s cubic-bezier(0.4,0,0.2,1)}
.speed-label{font-size:0.75rem;color:rgba(255,255,255,0.35);margin-top:6px}
.problem-issues{display:flex;flex-direction:column;gap:16px;margin-top:32px}
.issue-item{display:flex;align-items:flex-start;gap:14px;padding:16px;background:rgba(255,255,255,0.03);border-radius:10px;border-left:3px solid #dc3545;border:1px solid rgba(255,255,255,0.06);border-left:3px solid #dc3545}
.issue-item svg{flex-shrink:0;width:22px;height:22px;color:#dc3545}
.issue-text h4{font-size:0.95rem;font-weight:600;margin-bottom:2px;color:#fff}
.issue-text p{font-size:0.85rem;color:rgba(255,255,255,0.45)}

@media(max-width:768px){
  .problem-grid{grid-template-columns:1fr;gap:40px}
}

/* ===== HOW IT WORKS ===== */
.how-it-works{background:#000}
.how-it-works::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,163,255,0.15),transparent)}
.how-it-works{position:relative}
.steps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:48px;position:relative}
.steps-grid::before{content:'';position:absolute;top:52px;left:16.66%;right:16.66%;height:2px;background:linear-gradient(90deg,#00a3ff,rgba(0,163,255,0.2));z-index:0}
.step-card{text-align:center;position:relative;z-index:1}
.step-icon{width:104px;height:104px;border-radius:50%;background:rgba(0,0,0,0.8);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;position:relative;transition:all 0.4s}
.step-card:hover .step-icon{border-color:#00a3ff;box-shadow:0 0 30px rgba(0,163,255,0.15)}
.step-icon svg{width:40px;height:40px;color:#00a3ff}
.step-number{position:absolute;top:-4px;right:-4px;width:32px;height:32px;background:#ff6b35;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:700}
.step-card h3{margin-bottom:8px;color:#fff}
.step-card p{color:rgba(255,255,255,0.45);font-size:0.9rem}

@media(max-width:768px){
  .steps-grid{grid-template-columns:1fr;gap:40px}
  .steps-grid::before{display:none}
}

/* ===== PLANS ===== */
.plans{background:linear-gradient(180deg,#060620 0%,#0a0a1a 100%);color:#fff;position:relative;overflow:hidden}
.plans::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle at 50% 0%,rgba(0,163,255,0.06) 0%,transparent 60%);pointer-events:none}
.plans .section-label{color:#00a3ff}
.plans .section-subtitle{color:rgba(255,255,255,0.4)}
.plans-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;position:relative;z-index:1}
.plan-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:36px 28px;transition:all 0.4s;display:flex;flex-direction:column}
.plan-card:hover{transform:translateY(-8px);border-color:rgba(0,163,255,0.3);box-shadow:0 12px 40px rgba(0,0,0,0.4),0 0 30px rgba(0,163,255,0.1)}
.plan-card.popular{background:rgba(0,163,255,0.06);border-color:rgba(0,163,255,0.3);position:relative;transform:scale(1.04)}
.plan-card.popular:hover{transform:scale(1.04) translateY(-8px);box-shadow:0 12px 40px rgba(0,0,0,0.4),0 0 40px rgba(0,163,255,0.15)}
.popular-badge{position:absolute;top:-14px;left:50%;transform:translateX(-50%);background:#ff6b35;color:#fff;padding:4px 20px;border-radius:100px;font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap}
.plan-name{font-size:1.1rem;font-weight:600;color:rgba(255,255,255,0.6);margin-bottom:16px}
.plan-price{font-size:2.8rem;font-weight:800;color:#fff;margin-bottom:4px}
.plan-price small{font-size:0.9rem;font-weight:400;color:rgba(255,255,255,0.35)}
.plan-speed{color:#00a3ff;font-weight:700;font-size:1.1rem;margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid rgba(255,255,255,0.06)}
.plan-features{display:flex;flex-direction:column;gap:12px;margin-bottom:28px;flex:1}
.plan-feature{display:flex;align-items:center;gap:10px;font-size:0.9rem;color:rgba(255,255,255,0.55)}
.plan-feature svg{width:18px;height:18px;color:#00a3ff;flex-shrink:0}
.plan-card .btn{width:100%;justify-content:center}
.plans-note{text-align:center;margin-top:32px;color:rgba(255,255,255,0.35);font-size:0.9rem;position:relative;z-index:1}

@media(max-width:960px){
  .plans-grid{grid-template-columns:repeat(2,1fr);gap:16px}
  .plan-card.popular{transform:scale(1)}
  .plan-card.popular:hover{transform:translateY(-8px)}
}
@media(max-width:600px){
  .plans-grid{grid-template-columns:1fr;max-width:400px;margin:0 auto}
}

/* ===== SATELLITE SIGNAL ANIMATION ===== */
@keyframes signal-pulse{0%{stroke-dashoffset:20}100%{stroke-dashoffset:0}}
@keyframes signal-blink{0%,100%{opacity:0.15}50%{opacity:0.7}}
.signal-line{stroke:#00a3ff;stroke-width:1.2;fill:none;stroke-dasharray:6 4;animation:signal-pulse 1.5s linear infinite,signal-blink 2.5s ease-in-out infinite}
.signal-line:nth-child(2){animation-delay:0.3s}
.signal-line:nth-child(3){animation-delay:0.6s}
.signal-line:nth-child(4){animation-delay:0.9s}
.signal-line:nth-child(5){animation-delay:1.2s}

/* ===== COVERAGE ===== */
.coverage{background:#000;position:relative}
.coverage::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,163,255,0.15),transparent)}
.coverage-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center}
.cuba-map-wrapper{position:relative;padding:40px}
.cuba-map svg{width:100%;height:auto}
.cuba-map .island{fill:none;stroke:#00a3ff;stroke-width:2;opacity:0.6}
.cuba-map .island-fill{fill:rgba(0,163,255,0.06)}
.map-dot{position:absolute;width:10px;height:10px;background:#ff6b35;border-radius:50%;box-shadow:0 0 0 4px rgba(255,107,53,0.2);animation:map-pulse 2s ease infinite}
@keyframes map-pulse{0%,100%{box-shadow:0 0 0 4px rgba(255,107,53,0.2)}50%{box-shadow:0 0 0 8px rgba(255,107,53,0.05)}}
.cities-list{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:24px}
.city-item{display:flex;align-items:center;gap:8px;font-size:0.9rem;color:rgba(255,255,255,0.5)}
.city-item svg{width:14px;height:14px;color:#00a3ff;flex-shrink:0}
.coverage-features{display:flex;flex-direction:column;gap:20px}
.coverage-feature{display:flex;align-items:flex-start;gap:16px;padding:20px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;transition:all 0.3s}
.coverage-feature:hover{border-color:rgba(0,163,255,0.2);box-shadow:0 0 20px rgba(0,163,255,0.05)}
.coverage-feature-icon{width:48px;height:48px;background:rgba(0,163,255,0.1);border:1px solid rgba(0,163,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.coverage-feature-icon svg{width:24px;height:24px;color:#00a3ff}
.coverage-feature h4{font-weight:600;margin-bottom:4px;color:#fff}
.coverage-feature p{font-size:0.9rem;color:rgba(255,255,255,0.45)}

@media(max-width:768px){
  .coverage-grid{grid-template-columns:1fr;gap:40px}
}

/* ===== WHY CUBALINK ===== */
.why{background:#060620;position:relative}
.why::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,163,255,0.15),transparent)}
/* Subtle grid overlay */
.why::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background-image:
  linear-gradient(rgba(0,163,255,0.02) 1px,transparent 1px),
  linear-gradient(90deg,rgba(0,163,255,0.02) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.why-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;position:relative;z-index:1}
.why-card{background:rgba(255,255,255,0.03);border-radius:16px;padding:36px 28px;text-align:center;border:1px solid rgba(255,255,255,0.06);transition:all 0.4s}
.why-card:hover{transform:translateY(-8px);box-shadow:0 12px 40px rgba(0,0,0,0.3),0 0 30px rgba(0,163,255,0.1);border-color:rgba(0,163,255,0.3)}
.why-icon{width:72px;height:72px;background:rgba(0,163,255,0.08);border:1px solid rgba(0,163,255,0.15);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;transition:all 0.3s}
.why-card:hover .why-icon{box-shadow:0 0 25px rgba(0,163,255,0.15);border-color:rgba(0,163,255,0.4)}
.why-icon svg{width:32px;height:32px;color:#00a3ff}
.why-card h3{margin-bottom:8px;color:#fff}
.why-card p{color:rgba(255,255,255,0.45);font-size:0.9rem}

@media(max-width:960px){.why-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.why-grid{grid-template-columns:1fr}}

/* ===== ABOUT ===== */
.about{background:#000;position:relative}
.about::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,163,255,0.15),transparent)}
.about-inner{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center}
.about-visual{position:relative;background:linear-gradient(135deg,#060620,#0a0a2a);border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:60px 40px;text-align:center;overflow:hidden}
.about-visual::before{content:'';position:absolute;top:-50%;right:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(0,163,255,0.06) 0%,transparent 60%);pointer-events:none}
.about-visual svg{width:120px;height:120px;margin:0 auto 24px;position:relative;z-index:1}
.about-visual-text{color:#fff;font-size:1.4rem;font-weight:700;position:relative;z-index:1}

<script>
/* ===== GENERATE STAR FIELD ===== */
(function() {
  var field = document.getElementById('starfield');
  var count = 70;
  var html = '';
  for (var i = 0; i < count; i++) {
    var x = (Math.random() * 100).toFixed(1);
    var y = (Math.random() * 100).toFixed(1);
    var size = (1 + Math.random() * 2).toFixed(1);
    var dur = (2 + Math.random() * 4).toFixed(1);
    var delay = (Math.random() * 5).toFixed(1);
    html += '<div class="star" style="left:'+x+'%;top:'+y+'%;width:'+size+'px;height:'+size+'px;--dur:'+dur+'s;--delay:-'+delay+'s;animation-delay:var(--delay)"></div>';
  }
  field.innerHTML = html;
})();

/* ===== LANGUAGE TOGGLE ===== */
var currentLang = localStorage.getItem('cubalink-lang') || 'es';

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('cubalink-lang', lang);
  document.documentElement.lang = lang;

  document.querySelectorAll('.lang').forEach(function(el) {
    var text = el.getAttribute('data-' + lang);
    if (text !== null) el.innerHTML = text;
  });

  document.querySelectorAll('[data-placeholder-' + lang + ']').forEach(function(el) {
    el.placeholder = el.getAttribute('data-placeholder-' + lang);
  });

  document.querySelectorAll('.lang-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
  });
}

setLang(currentLang);

document.querySelectorAll('.lang-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    setLang(this.getAttribute('data-lang'));
  });
});

/* ===== NAV SCROLL ===== */
var nav = document.getElementById('nav');
window.addEventListener('scroll', function() {
  nav.classList.toggle('scrolled', window.scrollY > 60);
}, {passive: true});

/* ===== MOBILE NAV ===== */
var menuBtn = document.getElementById('menuBtn');
var mobileNav = document.getElementById('mobileNav');
var mobileClose = document.getElementById('mobileClose');

menuBtn.addEventListener('click', function() {
  mobileNav.classList.add('open');
});
mobileClose.addEventListener('click', function() {
  mobileNav.classList.remove('open');
});
document.querySelectorAll('.mobile-link').forEach(function(link) {
  link.addEventListener('click', function() {
    mobileNav.classList.remove('open');
  });
});

/* ===== FAQ ACCORDION ===== */
document.querySelectorAll('.faq-question').forEach(function(q) {
  q.addEventListener('click', function() {
    var item = this.parentElement;
    var wasOpen = item.classList.contains('open');
    document.querySelectorAll('.faq-item').forEach(function(i) { i.classList.remove('open'); });
    if (!wasOpen) item.classList.add('open');
  });
});

/* ===== SCROLL REVEAL ===== */
function revealOnScroll() {
  var reveals = document.querySelectorAll('.reveal, .reveal-left, .reveal-right');
  for (var i = 0; i < reveals.length; i++) {
    var el = reveals[i];
    var top = el.getBoundingClientRect().top;
    if (top < window.innerHeight - 80) {
      el.classList.add('visible');
    }
  }
}
window.addEventListener('scroll', revealOnScroll, {passive: true});
window.addEventListener('load', revealOnScroll);

/* ===== SPEED BAR ANIMATION ===== */
var speedObserver = new IntersectionObserver(function(entries) {
  entries.forEach(function(entry) {
    if (entry.isIntersecting) {
      document.getElementById('bar-etecsa').classList.add('animated');
      document.getElementById('bar-cubalink').classList.add('animated');
      speedObserver.unobserve(entry.target);
    }
  });
}, {threshold: 0.3});

var speedSection = document.querySelector('.speed-compare');
if (speedSection) speedObserver.observe(speedSection);

/* ===== SMOOTH SCROLL FOR ANCHOR LINKS ===== */
document.querySelectorAll('a[href^="#"]').forEach(function(a) {
  a.addEventListener('click', function(e) {
    var target = document.querySelector(this.getAttribute('href'));
    if (target) {
      e.preventDefault();
      var offset = 80;
      var pos = target.getBoundingClientRect().top + window.scrollY - offset;
      window.scrollTo({top: pos, behavior: 'smooth'});
    }
  });
});
</script>
